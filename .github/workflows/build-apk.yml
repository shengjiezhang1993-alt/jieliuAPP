name: Build Flet APK
on:
  push:
    branches: [ main, master ] # 每次推送到 main 或 master 分支时自动触发
  workflow_dispatch:           # 允许在网页上手动点击按钮触发打包

jobs:
  build:
    runs-on: ubuntu-latest     # 使用 GitHub 提供的 Linux 虚拟服务器

    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Flet 及打包依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 接受 Android 许可证条款
        run: yes | sdkmanager --licenses || true

      - name: 执行 Flet 编译 APK
        run: |
          flet build apk --verbose

      - name: 上传打包好的 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: jieliuAPP-release-apk
          path: build/apk/